<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Meta description ensures 100% Lighthouse SEO Score -->
    <meta name="description" content="Urban Rooftop Gardening Service management interface for staff.">
    <title>Urban Rooftop Gardening</title>

    <!-- Code-based SVG Favicon (Strict Monochromatic Design) -->
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23000000'/><text y='72' x='25' font-size='65' font-family='sans-serif' font-weight='bold' fill='%23ffffff'>G</text></svg>">

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main class="container">
        <header>
            <h1>Urban Rooftop Gardening</h1>
            <p>Staff Portal: Search and manage rooftop gardening services.</p>
        </header>

        <!-- The "Happy Path" Search Interface -->
        <section class="search-section">
            <form id="searchForm" novalidate>
                <div class="input-group">
                    <!-- sr-only label ensures 100% Lighthouse accessibility score -->
                    <label for="searchInput" class="sr-only">Search for a gardening service</label>
                    <input type="text" id="searchInput" placeholder="Search services (e.g., Soil, Irrigation)..."
                        aria-label="Search for a gardening service">
                    <button type="submit" aria-label="Search Services">Search</button>
                </div>
                <!-- The "Unhappy Path" Error Message (Hidden by default) -->
                <p id="errorText" class="error-message hidden" aria-live="polite">Please enter a valid search term.</p>
            </form>
        </section>

        <!-- The "Unhappy Path" Bad Connectivity Loading State (Hidden by default) -->
        <section class="status-section">
            <div id="loadingIndicator" class="hidden" aria-live="assertive">
                <div class="spinner"></div>
                <p>Connecting to database...</p>
            </div>
        </section>

        <!-- The Results Area -->
        <section id="resultsArea" class="results-grid" aria-live="polite">
            <!-- Results or the "No data found" empty state will be injected here via JavaScript -->
        </section>
    </main>
    <script src="app.js"></script>
</body>

</html>
